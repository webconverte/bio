<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beleza - WebConverte</title>
    <link rel="stylesheet" href="../style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="https://webconverte.com.br" class="logo">
                <span>WEB</span>CONVERTE
            </a>
            <h1 class="headline">Profissionais de Beleza</h1>
            <p class="subtitle">Escolha sua especialidade para descobrir como lotar sua agenda com regularidade.</p>
        </header>

        <main class="links-wrapper">
            <a href="https://webconverte.com.br/beleza/cabeleireiro" class="btn">
                <div class="icon-wrapper">
                    <i data-lucide="scissors"></i>
                </div>
                <div class="btn-content">
                    <span class="btn-title">Cabeleireiro(a)</span>
                </div>
                <i data-lucide="arrow-up-right" class="chevron"></i>
            </a>

            <a href="https://webconverte.com.br/beleza/lash-designer" class="btn">
                <div class="icon-wrapper">
                    <i data-lucide="eye"></i>
                </div>
                <div class="btn-content">
                    <span class="btn-title">Lash Designer</span>
                </div>
                <i data-lucide="arrow-up-right" class="chevron"></i>
            </a>

            <a href="https://webconverte.com.br/beleza/sobrancelhas" class="btn">
                <div class="icon-wrapper">
                    <i data-lucide="wand-2"></i>
                </div>
                <div class="btn-content">
                    <span class="btn-title">Sobrancelhas</span>
                </div>
                <i data-lucide="arrow-up-right" class="chevron"></i>
            </a>

            <a href="https://webconverte.com.br/beleza/nail-designer" class="btn">
                <div class="icon-wrapper">
                    <i data-lucide="brush"></i>
                </div>
                <div class="btn-content">
                    <span class="btn-title">Nail Designer</span>
                </div>
                <i data-lucide="arrow-up-right" class="chevron"></i>
            </a>

            <a href="https://webconverte.com.br/beleza/maquiador" class="btn">
                <div class="icon-wrapper">
                    <i data-lucide="palette"></i>
                </div>
                <div class="btn-content">
                    <span class="btn-title">Maquiador(a)</span>
                </div>
                <i data-lucide="arrow-up-right" class="chevron"></i>
            </a>

            <a href="../" class="btn-back">
                <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i>
                Voltar
            </a>
        </main>

        <footer class="footer">
            <p>© 2024 WebConverte. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
