<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saúde - WebConverte</title>
    <link rel="stylesheet" href="../style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="https://webconverte.com.br" class="logo">
                <span>WEB</span>CONVERTE
            </a>
            <h1 class="headline">Profissionais de Saúde</h1>
            <p class="subtitle">Escolha sua especialidade para descobrir como lotar sua agenda de pacientes particulares.</p>
        </header>

        <main class="links-wrapper">
            <a href="https://webconverte.com.br/saude/psicologo" class="btn">
                <div class="icon-wrapper">
                    <i data-lucide="brain"></i>
                </div>
                <div class="btn-content">
                    <span class="btn-title">Psicólogo(a)</span>
                </div>
                <i data-lucide="arrow-up-right" class="chevron"></i>
            </a>

            <a href="https://webconverte.com.br/saude/dentista" class="btn">
                <div class="icon-wrapper">
                    <i data-lucide="smile"></i>
                </div>
                <div class="btn-content">
                    <span class="btn-title">Dentista</span>
                </div>
                <i data-lucide="arrow-up-right" class="chevron"></i>
            </a>

            <a href="https://webconverte.com.br/saude/nutricionista" class="btn">
                <div class="icon-wrapper">
                    <i data-lucide="apple"></i>
                </div>
                <div class="btn-content">
                    <span class="btn-title">Nutricionista</span>
                </div>
                <i data-lucide="arrow-up-right" class="chevron"></i>
            </a>

            <a href="https://webconverte.com.br/saude/fisioterapeuta" class="btn">
                <div class="icon-wrapper">
                    <i data-lucide="activity"></i>
                </div>
                <div class="btn-content">
                    <span class="btn-title">Fisioterapeuta</span>
                </div>
                <i data-lucide="arrow-up-right" class="chevron"></i>
            </a>

            <a href="https://webconverte.com.br/saude/fonoaudiologo" class="btn">
                <div class="icon-wrapper">
                    <i data-lucide="ear"></i>
                </div>
                <div class="btn-content">
                    <span class="btn-title">Fonoaudiólogo(a)</span>
                </div>
                <i data-lucide="arrow-up-right" class="chevron"></i>
            </a>

            <a href="../" class="btn-back">
                <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i>
                Voltar
            </a>
        </main>

        <footer class="footer">
            <p>© 2026 WebConverte. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
