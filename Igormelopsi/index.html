<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Psicóloga Clínica - Agende sua consulta e conheça nossos serviços de psicologia.">
    <title>Dr Igor Melo | Psicólogo Clínica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- IMAGEM DE FUNDO (trocar em: imagens/fundo.png) -->
    <div class="background-layer"></div>

    <main class="card" id="card-principal">

        <!-- ╔══════════════════════════════════════════════════════╗ -->
        <!-- ║  FOTO DO PROFISSIONAL                                ║ -->
        <!-- ║  Para trocar: substitua o arquivo imagens/foto-profissional.png ║ -->
        <!-- ╚══════════════════════════════════════════════════════╝ -->
        <div class="photo-section">
            <div class="photo-ring">
                <img src="imagens/foto-profissional.png" alt="Foto da Psicóloga" class="profile-photo" id="foto-profissional">
            </div>
        </div>

        <!-- ╔══════════════════════════════════════════════════════╗ -->
        <!-- ║  NOME E ESPECIALIDADE                                ║ -->
        <!-- ║  Edite o nome e a especialidade abaixo               ║ -->
        <!-- ╚══════════════════════════════════════════════════════╝ -->
        <div class="info-section">
            <div class="psi-icon" aria-hidden="true">Ψ</div>
            <h1 class="name" id="nome-profissional">Dr. Igor Melo</h1>
            <p class="specialty" id="especialidade">PSICÓLOGO CLÍNICO</p>
            <p class="crp" id="crp">CRP PB 9799</p>
        </div>

        <!-- ╔══════════════════════════════════════════════════════╗ -->
        <!-- ║  BOTÕES DE LINK                                      ║ -->
        <!-- ║                                                      ║ -->
        <!-- ║  Para ADICIONAR um botão: copie um bloco <a> abaixo  ║ -->
        <!-- ║  e cole antes do </nav>                              ║ -->
        <!-- ║                                                      ║ -->
        <!-- ║  Para REMOVER um botão: apague o bloco <a> inteiro   ║ -->
        <!-- ║                                                      ║ -->
        <!-- ║  Para MUDAR o texto: edite o texto entre as tags     ║ -->
        <!-- ║  Para MUDAR o link: edite o href="..."               ║ -->
        <!-- ╚══════════════════════════════════════════════════════╝ -->
        <nav class="links-section" id="secao-botoes">

            <!-- BOTÃO 1 - Agendar Consulta -->
            <a href="https://wa.me/5500000000000" target="_blank" rel="noopener" class="link-btn" id="btn-agendar">AGENDAR CONSULTA</a>

            <!-- BOTÃO 2 - WhatsApp -->
            <a href="https://wa.me/5500000000000" target="_blank" rel="noopener" class="link-btn" id="btn-whatsapp">WHATSAPP</a>

            <!-- BOTÃO 3 - Instagram -->
            <a href="https://instagram.com/seuperfil" target="_blank" rel="noopener" class="link-btn" id="btn-instagram">INSTAGRAM</a>

            <!-- BOTÃO 4 - Localização -->
            <a href="https://maps.google.com" target="_blank" rel="noopener" class="link-btn" id="btn-localizacao">LOCALIZAÇÃO</a>

            <!-- BOTÃO 5 - Nossos Serviços -->
            <a href="#" target="_blank" rel="noopener" class="link-btn" id="btn-servicos">NOSSOS SERVIÇOS</a>

            <!-- BOTÃO 6 - Site -->
            <a href="#" target="_blank" rel="noopener" class="link-btn" id="btn-site">SITE</a>

            <!--
                ╔═══════════════════════════════════════════════╗
                ║  COMO ADICIONAR UM NOVO BOTÃO:                ║
                ║                                               ║
                ║  1. Copie o bloco abaixo                      ║
                ║  2. Cole acima deste comentário               ║
                ║  3. Troque "SEU LINK AQUI" pelo link          ║
                ║  4. Troque "TEXTO DO BOTÃO" pelo texto        ║
                ║                                               ║
                ║  <a href="SEU LINK AQUI" target="_blank"      ║
                ║     rel="noopener" class="link-btn">          ║
                ║     TEXTO DO BOTÃO                            ║
                ║  </a>                                         ║
                ╚═══════════════════════════════════════════════╝
            -->

        </nav>

        <!-- Rodapé -->
        <footer class="footer">
            <p>Saúde mental é prioridade 💚</p>
        </footer>

    </main>

</body>
</html>
